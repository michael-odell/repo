# Public base fragment (mirrors DESIGN §3.8).

[defaults]
worktrees  = false
branches   = ["main"]
on_rewrite = "stop"
prune      = "auto"
host       = "github"

[hosts.github]
base = "git@github.com:"
[hosts.ghe]
base = "git@ghe.example.com:"

[root.work]
dir        = "~/wd"
host       = "ghe"
layout     = "owner"
worktrees  = true
fork_owner = "ghe:michael-odell"

[[root.work.repo]]
id       = "ghe:cban-ops/pt-helm"
workflow = "fork-pr"
branches = ["main", "release"]
hooks    = [ { after = "fetch", run = "helm dep update ." } ]

[root.plugins]
dir    = "~/.zsh/plugins"
layout = "flat"
repos = [
  "github:michael-odell/zsh-history",   # own plugin: upstream-push, no fork
]

[[root.plugins.repo]]
id       = "github:romkatv/powerlevel10k"
fork     = "github:michael-odell/powerlevel10k"
workflow = "supply-chain-mirror"
branches = ["master"]
